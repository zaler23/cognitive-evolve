name: Feature request
description: Suggest a focused improvement
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or maintainer problem does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the smallest useful change.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: textarea
    id: complexity
    attributes:
      label: Complexity budget
      description: Explain new dependencies, services, adapters, UI, MCP, or fallback paths. Write "none" if not applicable.
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation signal
      description: How would maintainers know this works?
    validations:
      required: true
